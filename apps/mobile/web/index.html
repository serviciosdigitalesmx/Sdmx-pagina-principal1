<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FIXI Mobile</title>
    <meta name="theme-color" content="#08111f" />
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }
      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top, rgba(125, 211, 252, 0.16), transparent 24%),
          linear-gradient(180deg, #08111f 0%, #091428 54%, #070b14 100%);
        color: #e2e8f0;
      }
      body {
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(720px, 100%);
        border: 1px solid rgba(125, 211, 252, 0.16);
        border-radius: 28px;
        padding: 28px;
        background: rgba(15, 23, 42, 0.92);
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 22px;
      }
      .brand img {
        width: 92px;
        height: 92px;
        border-radius: 24px;
        object-fit: cover;
        box-shadow: 0 14px 30px rgba(0, 0, 0, 0.32);
      }
      .brand-copy {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .eyebrow {
        margin: 0;
        color: #7dd3fc;
        font-size: 12px;
        letter-spacing: 0.34em;
        text-transform: uppercase;
      }
      h1 {
        margin: 0;
        font-size: 38px;
        line-height: 1.04;
        letter-spacing: -0.05em;
        color: #fff;
      }
      p {
        margin: 0;
        font-size: 16px;
        line-height: 1.65;
        color: #cbd5e1;
      }
      .meta {
        margin-top: 20px;
        padding: 14px 16px;
        border-radius: 16px;
        background: rgba(8, 17, 31, 0.72);
        border: 1px solid rgba(125, 211, 252, 0.12);
        color: #7dd3fc;
        font-size: 13px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="brand">
        <img src="./logo.png" alt="FIXI" />
        <div class="brand-copy">
          <p class="eyebrow">FIXI Mobile</p>
          <h1>Tu operación de taller, en Android.</h1>
        </div>
      </div>
      <p>
        Este wrapper Android abre el frontend real del panel del taller. Si no se carga
        el panel, revisa la variable <strong>NEXT_PUBLIC_WEB_ADMIN_URL</strong> o
        <strong>MOBILE_WEB_URL</strong>.
      </p>
      <div class="meta">Wrapper nativo sobre el frontend existente</div>
    </main>
  </body>
</html>
