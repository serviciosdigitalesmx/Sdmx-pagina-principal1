services:
  - type: web
    name: sdmx-backend-api
    runtime: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @white-label/api build
    startCommand: pnpm --filter @white-label/api start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CORS_ALLOWED_ORIGINS
        value: https://serviciosdigitalesmx.online,https://app.serviciosdigitalesmx.online,https://clientes.serviciosdigitalesmx.online,https://api.serviciosdigitalesmx.online,http://localhost:3000,http://localhost:3001
      - key: APP_URL
        value: https://serviciosdigitalesmx.online
      - key: WEBHOOK_BASE_URL
        sync: false
      - key: BASE_DOMAIN
        value: serviciosdigitalesmx.online
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: API_NAME
        value: Sdmx Backend API
